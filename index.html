<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hacked</title>
    <style>
        body { margin:0; background:#000; color:white; font-family:'Courier New', monospace; height:100vh; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; }
        
        /* Scary Animation */
        .scary { background:#300; animation:pulse 0.5s infinite alternate; }
        @keyframes pulse { from{background:#500} to{background:#800} }

        /* Start Screen */
        #startScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
        h1.welcome { font-size:40px; margin-bottom:30px; text-transform:uppercase; letter-spacing:2px; }
        button#startBtn { padding:20px 50px; font-size:24px; background:#ff3333; color:white; border:none; border-radius:10px; box-shadow:0 0 15px rgba(255,51,51,0.6); cursor:pointer; }

        /* Main Hacked Screen */
        #mainContent { display:none; text-align:center; width:90%; }
        .logo { width:60px; height:60px; background:white; display:grid; grid-template-columns:1fr 1fr; gap:2px; margin:0 auto 20px auto; }
        .sq { background:#000; }
        
        h1.hacked { color:#ff3333; font-size:36px; text-shadow:2px 2px 0 #000; margin:0; }
        p.status { font-size:18px; color:#ccc; margin:10px 0; }

        .input-area { background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; border:2px solid #ff3333; margin-top:20px; }
        input[type="number"] { font-size:40px; width:180px; text-align:center; background:transparent; border:none; color:white; outline:none; }
        button.checkBtn { display:block; margin:15px auto 0; padding:10px 30px; background:#ff3333; color:white; border:none; font-size:18px; cursor:pointer; }
        
        .msg { margin-top:20px; font-weight:bold; min-height:30px; color:#ffcc00; }
    </style>
</head>
<body id="body">

    <!-- Start Screen -->
    <div id="startScreen">
        <h1 class="welcome">Welcome</h1>
        <button id="startBtn">TAP HERE</button>
    </div>

    <!-- Main Hacked Screen -->
    <div id="mainContent">
        <div class="logo">
            <div class="sq"></div><div class="sq"></div>
            <div class="sq"></div><div class="sq"></div>
        </div>
        
        <h1 class="hacked">SYSTEM HACKED</h1>
        <p class="status">Data Deleting...<br>Do not turn off phone.</p>

        <div class="input-area">
            <input type="number" id="codeInput" placeholder="Code">
            <button class="checkBtn" onclick="verify()">VERIFY</button>
        </div>

        <div class="msg" id="msgBox"></div>
    </div>

    <!-- Audio -->
    <audio id="alarm" src="Dangerous.mp3"></audio>

    <script>
        const body = document.body;
        const startScreen = document.getElementById('startScreen');
        const mainContent = document.getElementById('mainContent');
        const alarm = document.getElementById('alarm');
        const codeInput = document.getElementById('codeInput');
        const msgBox = document.getElementById('msgBox');
        
        let isLocked = true;

        // 1. Start Action
        document.getElementById('startBtn').addEventListener('click', function() {
            startScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            
            requestFullscreen();
            navigator.vibrate(200);
            alarm.play().catch(e => {});
            body.classList.add('scary');
            msgBox.innerText = "⚠️ LOCKED!";

            // 5 Minute Auto Unlock
            setTimeout(() => { if(isLocked) unlockSystem(); }, 300000);

            // --- BACK BUTTON FIX (The Loop Trick) ---
            // History ko push karte hain taaki back dabane par page wahi rahe
            history.pushState(null, null, location.href);
            
            // Jab user back button dabaye ya swipe kare
            window.onpopstate = function () {
                if(isLocked) {
                    navigator.vibrate(100);
                    msgBox.innerText = "🚫 STUCK!";
                    // Wapas history mein dhakka de do taaki wo bahar na nikle
                    history.pushState(null, null, location.href);
                    
                    // Force Fullscreen again (Android kabhi-kabhi fullscreen hatata hai)
                    requestFullscreen();
                } else {
                    window.onpopstate = null; // Unlock hone par normal kar do
                }
            };
        });

        function requestFullscreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {});
            }
        }

        // 2. Home Button / App Switcher Logic
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isLocked) {
                navigator.vibrate([500, 200, 500]);
                msgBox.innerText = "🚫 DON'T LEAVE!";
                requestFullscreen();
                window.focus();
            }
        });

        // 3. Unlock System
        function unlockSystem() {
            isLocked = false;
            body.classList.remove('scary');
            alarm.pause();
            msgBox.style.color = "#00ff00";
            msgBox.innerText = "✅ UNLOCKED";
            
            setTimeout(() => {
                mainContent.innerHTML = `
                    <h1 style="color:#00ff00; font-size:40px;">🔓 UNLOCKED</h1>
                    <p>Hacking Complete.<br>You can use your phone now.</p>
                `;
            }, 1500);
        }

        // 4. Verify Code
        function verify() {
            const code = codeInput.value;
            
            if (code === "83558") {
                unlockSystem();
            } else {
                navigator.vibrate([100, 50, 100]);
                msgBox.style.color = "#ff3333";
                msgBox.innerText = "❌ WRONG CODE! TRY AGAIN.";
                codeInput.value = "";
            }
        }
    </script>
</body>
</html>
