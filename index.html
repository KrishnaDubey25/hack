<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Critical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* डरावना लाल रंग */
        body.scary-mode {
            background-color: #500000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { background-color: #500000; box-shadow: inset 0 0 50px #000; }
            50% { background-color: #800000; box-shadow: inset 0 0 100px #ff0000; }
            100% { background-color: #500000; box-shadow: inset 0 0 50px #000; }
        }

        .container {
            text-align: center;
            width: 90%;
            z-index: 10;
        }

        .microsoft-logo {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .sq { width: 25px; height: 25px; background: #fff; opacity: 0.8; }

        h1 {
            font-size: 32px;
            color: #ff3333;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 10px;
        }

        .status {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .code-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ff3333;
            margin-bottom: 20px;
        }

        input[type="number"] {
            font-size: 30px;
            padding: 10px;
            width: 150px;
            text-align: center;
            background: #000;
            color: #fff;
            border: none;
            outline: none;
        }

        .unlock-btn {
            display: block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff3333;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .message-box {
            margin-top: 20px;
            font-weight: bold;
            min-height: 50px;
            color: #ffcc00;
        }

        /* वibrate इंडिकेटर */
        .vibrating {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

    </style>
</head>
<body id="bodyElement">

    <div class="container" id="mainContainer">
        <!-- Microsoft Logo -->
        <div class="microsoft-logo">
            <div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div>
        </div>

        <h1>⚠️ SYSTEM HACKED ⚠️</h1>
        <p class="status">माइक्रोसॉफ्ट द्वारा फोन लॉक किया गया है।<br>डेटा मिटाया जा रहा है...</p>

        <!-- कोड इनपुट -->
        <div class="code-box">
            <p style="margin:0 0 10px 0; font-size:14px;">हैकिंग रोकने के लिए सीक्रेट कोड डालें:</p>
            <input type="number" id="secretCode" placeholder="****">
            <button class="unlock-btn" onclick="checkCode()">VERIFY</button>
        </div>

        <!-- मैसेज बॉक्स -->
        <div class="message-box" id="msgBox"></div>
        
        <!-- कॉल बटन -->
        <a href="tel:+911234567890" style="color: #fff; text-decoration: underline; font-size: 14px;">या कॉल करें: 1234567890</a>
    </div>

    <!-- यहाँ आप अपनी साउंड फाइल का लिंक या लोकल फाइल डालें -->
    <!-- नोट: 'danger.mp3' नाम की एक mp3 फाइल उसी फोल्डर में रखें -->
    <audio id="dangerSound" src="danger.mp3" loop></audio>

    <script>
        const body = document.body;
        const msgBox = document.getElementById('msgBox');
        const codeInput = document.getElementById('secretCode');
        const sound = document.getElementById('dangerSound');
        let isLocked = true;

        // 1. BACK BUTTON ट्रिक
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1); 
            
            if(isLocked) {
                triggerScaryMode();
            }
        };

        // डरावना मोड सक्रिय करने वाला फंक्शन
        function triggerScaryMode() {
            body.classList.add('scary-mode');
            
            // 1. Vibration Start (300ms का पैटर्न)
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 500]); 
            }

            msgBox.innerHTML = "⚠️ आप भाग नहीं सकते! हैकर्स ने पकड़ लिया!";
            msgBox.style.color = "#fff";
            
            // साउंड प्ले करें (यदि फाइल मौजूद है)
            sound.play().catch(e => console.log("Audio play failed"));

            setTimeout(() => {
                msgBox.innerHTML = "❌ प्रोसेस कैंसिल नहीं हो सकता...<br>अब और ज्यादा डेटा मिटा दिया जाएगा!";
            }, 2000);
        }

        // 2. कोड चेक करने का फंक्शन
        function checkCode() {
            const code = codeInput.value;

            if (code === "83558") {
                // सही कोड है
                body.classList.remove('scary-mode');
                
                // Vibration बंद करें
                if (navigator.vibrate) navigator.vibrate(0);
                
                // साउंड बंद करें
                sound.pause();

                msgBox.innerHTML = "✅ कोड सही है! हैकिंग बंद हो रही है...";
                msgBox.style.color = "#00ff00"; 
                
                setTimeout(() => {
                    document.getElementById('mainContainer').innerHTML = `
                        <h1 style="color:#00ff00;">🔓 UNLOCKED</h1>
                        <p>माइक्रोसॉफ्ट द्वारा हैकिंग समाप्त।<br>अब आप फोन का इस्तेमाल कर सकते हैं।</p>
                    `;
                }, 3000);

            } else {
                // गलत कोड है - फिर से डरावना मोड
                triggerScaryMode();
                codeInput.value = "";
            }
        }

        // पेज लोड होते ही एक बार वibrate करें ताकि यूजर को एहसास हो
        window.onload = function() {
            if (navigator.vibrate) navigator.vibrate(200);
        };

    </script>
</body>
</html>
