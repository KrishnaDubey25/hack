<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hacked</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; }
        .scary { animation:pulse 0.5s infinite alternate; background:#300; }
        @keyframes pulse { from{background:#500} to{background:#800} }
        #start { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:999; }
        button { padding:20px 40px; font-size:24px; background:#f00; color:#fff; border:none; border-radius:10px; margin-top:20px; cursor:pointer; }
        #main { display:none; text-align:center; }
        h1 { color:#f00; font-size:40px; margin:0; }
        .box { background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; margin-top:30px; border:2px solid #f00; }
        input { font-size:40px; width:150px; text-align:center; background:transparent; border:none; color:#fff; outline:none; }
        .msg { margin-top:20px; height:30px; font-weight:bold; color:#ffcc00; }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start">
        <h1>Welcome</h1>
        <button onclick="startHacking()">TAP HERE</button>
    </div>

    <!-- Main Hacked Screen -->
    <div id="main">
        <h1>SYSTEM HACKED</h1>
        <p>Data Deleting...</p>
        <div class="box">
            <input type="number" id="code" placeholder="Code">
            <br><button onclick="verify()" style="margin-top:10px; padding:10px 30px; font-size:18px;">VERIFY</button>
        </div>
        <div class="msg" id="msg"></div>
    </div>

    <audio id="alarm" src="Dangerous.mp3"></audio>

    <script>
        const start = document.getElementById('start');
        const main = document.getElementById('main');
        const body = document.body;
        const alarm = document.getElementById('alarm');
        const msg = document.getElementById('msg');
        
        let isLocked = true;

        function startHacking() {
            start.style.display = 'none';
            main.style.display = 'flex';
            
            // Fullscreen & Vibrate
            document.documentElement.requestFullscreen().catch(e => {});
            navigator.vibrate(200);
            alarm.play();
            body.classList.add('scary');
            msg.innerText = "🚫 LOCKED!";

            // 5 Minute Auto Unlock (300000 ms)
            setTimeout(() => { if(isLocked) unlock(); }, 300000);

            // --- THE BACK BUTTON FIX ---
            // History ko push karte hain taaki back dabane par wahi rahe
            history.pushState(null, null, location.href);
            window.onpopstate = function () {
                if(isLocked) {
                    navigator.vibrate(100);
                    msg.innerText = "🚫 STUCK!";
                    // Agar user ne back kiya, toh wapas history mein push karo
                    history.pushState(null, null, location.href);
                } else {
                    window.onpopstate = null; // Unlock hone par normal kar do
                }
            };
        }

        function verify() {
            if(document.getElementById('code').value === "83558") {
                unlock();
            } else {
                navigator.vibrate([100, 50, 100]);
                msg.innerText = "❌ WRONG CODE";
                document.getElementById('code').value = "";
            }
        }

        function unlock() {
            isLocked = false;
            body.classList.remove('scary');
            alarm.pause();
            msg.style.color = "#0f0";
            msg.innerText = "✅ UNLOCKED";
            
            setTimeout(() => {
                main.innerHTML = "<h1 style='color:#0f0'>UNLOCKED</h1><p>Go Ahead.</p>";
            }, 1500);
        }

        // Home button handle karne ke liye visibility change
        document.addEventListener('visibilitychange', () => {
            if(document.hidden && isLocked) {
                navigator.vibrate(500);
                msg.innerText = "🚫 DON'T LEAVE!";
                document.documentElement.requestFullscreen().catch(e => {});
            }
        });
    </script>
</body>
</html>
