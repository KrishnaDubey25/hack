<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hacked</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { background-color: #300000; }
            100% { background-color: #600000; }
        }
        
        .scary-bg { animation: pulse 1s infinite alternate; }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 1px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(0px, -1px) rotate(1deg); }
            80% { transform: translate(1px, 2px) rotate(-1deg); }
            90% { transform: translate(-1px, -1px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        .shake { animation: shake 0.3s; }

        /* --- Layout --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #main-screen {
            display: none; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        h1 { font-size: 3rem; color: #ff3333; margin-bottom: 10px; text-shadow: 2px 2px 5px #000; }
        p { font-size: 1.2rem; color: #ccc; margin-bottom: 40px; }

        .input-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid #ff3333;
            padding: 20px;
            border-radius: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        input {
            font-size: 3rem; width: 150px; text-align: center;
            background: transparent; border: none; color: white; margin-bottom: 20px;
        }

        button {
            padding: 15px 40px; font-size: 1.2rem; background: #ff3333;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
        }

        button:active { transform: scale(0.95); }

        #msg { height: 30px; margin-top: 20px; font-weight: bold; color: #ffcc00; }

    </style>
</head>
<body id="body">

    <audio id="alarm" src="Dangerous.mp3" loop></audio>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1 style="color:white;">WELCOME</h1>
        <button id="start-btn">TAP HERE</button>
    </div>

    <!-- Main Hacked Screen -->
    <div id="main-screen">
        <h1>SYSTEM<br>HACKED</h1>
        <p>Data Deleting...</p>
        
        <div class="input-box">
            <input type="number" id="code" placeholder="Code">
            <button onclick="verify()">VERIFY</button>
        </div>

        <div id="msg"></div>
    </div>

<script>
    const body = document.getElementById('body');
    const startScreen = document.getElementById('start-screen');
    const mainScreen = document.getElementById('main-screen');
    const alarm = document.getElementById('alarm');
    const codeInput = document.getElementById('code');
    const msg = document.getElementById('msg');

    let isLocked = true;
    let backCount = 0;
    const MAX_BACK_PRESSES = 10;
    const CORRECT_CODE = "83558";

    // Start Function
    document.getElementById('start-btn').addEventListener('click', () => {
        startScreen.style.display = 'none';
        mainScreen.style.display = 'flex';
        
        // Effects
        body.classList.add('scary-bg');
        navigator.vibrate(200);
        alarm.play().catch(e => console.log("Audio error"));

        // Lock Logic
        msg.innerText = "🚫 LOCKED";
        
        // Initialize History Stack for Back Button Trap
        history.pushState(null, null, location.href);
        
        // Auto Unlock in 5 mins
        setTimeout(() => { if(isLocked) unlock(); }, 300000);

        // Bind Back Button
        window.onpopstate = function () {
            handleBackPress();
        };
    });

    // --- BACK BUTTON LOGIC (FIXED) ---
    function handleBackPress() {
        if (!isLocked) return; // If already unlocked, do nothing or let it go

        backCount++;
        
        // Silent Vibration Feedback (No Text for first 9 presses)
        navigator.vibrate(50); 
        
        // Force Fullscreen again (Fixes exiting fullscreen issue)
        const elem = document.documentElement;
        if (!document.fullscreenElement) {
            elem.requestFullscreen().catch(err => {});
        }

        // If count < 10, push state again to keep it stuck
        if (backCount < MAX_BACK_PRESSES) {
            history.pushState(null, null, location.href);
        } else {
            // If count >= 10, we can choose to unlock or just let it stay.
            // Let's unlock it after 10 presses as per "after 10 press karo" request.
            msg.innerText = "✅ UNLOCKED";
            msg.style.color = "#00ff00";
            unlock();
        }
    }

    function verify() {
        if (codeInput.value === CORRECT_CODE) {
            unlock();
        } else {
            navigator.vibrate([100, 50, 100]);
            msg.innerText = "❌ WRONG CODE";
            msg.style.color = "#ff3333";
            
            // Shake Effect
            mainScreen.classList.add('shake');
            setTimeout(() => mainScreen.classList.remove('shake'), 300);
            
            codeInput.value = "";
        }
    }

    function unlock() {
        isLocked = false;
        body.classList.remove('scary-bg');
        alarm.pause();
        
        // Remove History Listener to allow normal back/exit
        window.onpopstate = null;

        setTimeout(() => {
            mainScreen.innerHTML = `
                <h1 style="color:#00ff00;">UNLOCKED</h1>
                <p>Hacking Complete.</p>
                <button onclick="location.reload()">RESET</button>
            `;
        }, 500);
    }

    // Handle Home Button / Visibility Change
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && isLocked) {
            navigator.vibrate(500);
            msg.innerText = "🚫 DON'T LEAVE!";
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {});
            }
        }
    });

</script>
</body>
</html>
