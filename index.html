<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Locked</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }

        /* Scary Background Animation */
        body.scary {
            background-color: #300000;
            animation: pulseRed 0.5s infinite alternate;
        }

        @keyframes pulseRed {
            from { background-color: #500000; box-shadow: inset 0 0 20px #000; }
            to { background-color: #800000; box-shadow: inset 0 0 100px #ff0000; }
        }

        /* Start Screen */
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            background: #000;
        }

        h1.welcome {
            font-size: 40px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button#startBtn {
            padding: 20px 50px;
            font-size: 24px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
            cursor: pointer;
        }

        /* Main Content */
        #mainContent {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            margin-bottom: 20px;
        }
        .sq { background: #000; }

        h1.hacked {
            color: #ff3333;
            font-size: 36px;
            text-shadow: 2px 2px 0 #000;
            margin: 0;
        }

        p.status {
            font-size: 18px;
            color: #ccc;
            margin: 10px 0;
        }

        .input-area {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff3333;
            margin-top: 20px;
        }

        input[type="number"] {
            font-size: 40px;
            width: 180px;
            text-align: center;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        button.checkBtn {
            display: block;
            margin: 15px auto 0;
            padding: 10px 30px;
            background: #ff3333;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .msg {
            margin-top: 20px;
            font-weight: bold;
            min-height: 30px;
            color: #ffcc00;
        }

    </style>
</head>
<body id="body">

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1 class="welcome">Welcome</h1>
        <button id="startBtn">TAP HERE</button>
    </div>

    <!-- MAIN HACKED SCREEN -->
    <div id="mainContent">
        <div class="logo">
            <div class="sq"></div><div class="sq"></div>
            <div class="sq"></div><div class="sq"></div>
        </div>
        
        <h1 class="hacked">SYSTEM HACKED</h1>
        <p class="status">Data Deleting...<br>Do not turn off phone.</p>

        <div class="input-area">
            <input type="number" id="codeInput" placeholder="Code">
            <button class="checkBtn" onclick="verify()">VERIFY</button>
        </div>

        <div class="msg" id="msgBox"></div>
    </div>

    <!-- Audio -->
    <audio id="alarm" src="Dangerous.mp3"></audio>

    <script>
        const body = document.body;
        const startScreen = document.getElementById('startScreen');
        const mainContent = document.getElementById('mainContent');
        const alarm = document.getElementById('alarm');
        const codeInput = document.getElementById('codeInput');
        const msgBox = document.getElementById('msgBox');
        
        let isLocked = true;
        let exitTimeout;

        // 1. TAP HERE Action
        document.getElementById('startBtn').addEventListener('click', function() {
            startScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            
            requestFullscreen();
            navigator.vibrate(200);
            alarm.play().catch(e => console.log(e));
            body.classList.add('scary');
            msgBox.innerText = "⚠️ LOCKED!";

            // Start the 5-minute timer for auto-release (optional, but requested)
            // If you want them to unlock manually only, remove this setTimeout block
            exitTimeout = setTimeout(() => {
                isLocked = false;
                body.classList.remove('scary');
                alarm.pause();
                msgBox.innerText = "✅ TIME UP!";
                setTimeout(() => {
                    mainContent.innerHTML = `<h1 style="color:#00ff00; font-size:40px;">🔓 UNLOCKED</h1><p>Hacking Complete.</p>`;
                }, 1000);
            }, 300000); // 5 minutes (300,000 ms)
        });

        function requestFullscreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {});
            }
        }

        // 2. BACK BUTTON LOGIC (Fixed: Single click works, doesn't exit)
        window.addEventListener('popstate', function() {
            if(isLocked) {
                navigator.vibrate(100); // Vibrate to let user know it's stuck
                msgBox.innerText = "🚫 STUCK!";
                
                // Go back again immediately so the stack doesn't fill up
                history.back(); 
            }
        });

        // 3. HOME & APP SWITCH LOGIC (Visibility Change)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isLocked) {
                navigator.vibrate([500, 200, 500]);
                msgBox.innerText = "🚫 DON'T LEAVE!";
                
                // Bring back to front
                requestFullscreen();
                window.focus();
            }
        });

        // 4. FORCE FULLSCREEN ON CLICK
        document.addEventListener('click', function(e) {
            if(isLocked && !document.fullscreenElement) {
                requestFullscreen();
            }
        });

        // 5. VERIFY CODE
        function verify() {
            const code = codeInput.value;
            
            if (code === "83558") {
                isLocked = false;
                body.classList.remove('scary');
                alarm.pause();
                navigator.vibrate(0);
                
                // Clear the 5 min timer so it doesn't overwrite the unlock message
                clearTimeout(exitTimeout);

                msgBox.style.color = "#00ff00";
                msgBox.innerText = "✅ UNLOCKED";
                
                setTimeout(() => {
                    mainContent.innerHTML = `
                        <h1 style="color:#00ff00; font-size:40px;">🔓 UNLOCKED</h1>
                        <p>Hacking Complete.<br>You can use your phone now.</p>
                    `;
                }, 2000);

            } else {
                navigator.vibrate([100, 50, 100]);
                msgBox.style.color = "#ff3333";
                msgBox.innerText = "❌ WRONG CODE! TRY AGAIN.";
                codeInput.value = "";
            }
        }

        // Initial push state for back button logic
        history.pushState(null, null, location.href);
        
    </script>
</body>
</html>
