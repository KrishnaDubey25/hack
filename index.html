<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>System Locked</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Scary Background Animation */
        body.scary {
            background-color: #300000;
            animation: pulseRed 0.8s infinite alternate;
        }

        @keyframes pulseRed {
            from { background-color: #500000; box-shadow: inset 0 0 20px #000; }
            to { background-color: #800000; box-shadow: inset 0 0 100px #ff0000; }
        }

        /* Start Screen */
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            background: #000;
        }

        h1.welcome {
            font-size: 40px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button#startBtn {
            padding: 20px 50px;
            font-size: 24px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
            cursor: pointer;
        }

        /* Main Content (Hidden initially) */
        #mainContent {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            margin-bottom: 20px;
        }
        .sq { background: #000; }

        h1.hacked {
            color: #ff3333;
            font-size: 36px;
            text-shadow: 2px 2px 0 #000;
            margin: 0;
        }

        p.status {
            font-size: 18px;
            color: #ccc;
            margin: 10px 0;
        }

        .input-area {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff3333;
            margin-top: 20px;
        }

        input[type="number"] {
            font-size: 40px;
            width: 180px;
            text-align: center;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        button.checkBtn {
            display: block;
            margin: 15px auto 0;
            padding: 10px 30px;
            background: #ff3333;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .msg {
            margin-top: 20px;
            font-weight: bold;
            min-height: 30px;
            color: #ffcc00;
        }

        /* Lock Overlay to prevent clicks elsewhere */
        #lockOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 998;
            display: none;
        }

    </style>
</head>
<body id="body">

    <!-- START SCREEN -->
    <div id="startScreen">
        <h1 class="welcome">Welcome</h1>
        <button id="startBtn">TAP HERE</button>
    </div>

    <!-- MAIN HACKED SCREEN -->
    <div id="mainContent">
        <div class="logo">
            <div class="sq"></div><div class="sq"></div>
            <div class="sq"></div><div class="sq"></div>
        </div>
        
        <h1 class="hacked">SYSTEM HACKED</h1>
        <p class="status">Data Deleting...<br>Do not turn off phone.</p>

        <div class="input-area">
            <input type="number" id="codeInput" placeholder="Code">
            <button class="checkBtn" onclick="verify()">VERIFY</button>
        </div>

        <div class="msg" id="msgBox"></div>
    </div>

    <!-- Audio -->
    <audio id="alarm" src="alarm.mp3" loop></audio>

    <script>
        const body = document.body;
        const startScreen = document.getElementById('startScreen');
        const mainContent = document.getElementById('mainContent');
        const alarm = document.getElementById('alarm');
        const codeInput = document.getElementById('codeInput');
        const msgBox = document.getElementById('msgBox');
        
        let isLocked = true;

        // 1. TAP HERE Action
        document.getElementById('startBtn').addEventListener('click', function() {
            startScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            
            // Force Fullscreen
            requestFullscreen();
            
            // Vibrate once
            navigator.vibrate(200);
            
            // Play Sound
            alarm.play().catch(e => console.log(e));

            // Start Scary Mode
            body.classList.add('scary');
            msgBox.innerText = "⚠️ LOCKED!";
        });

        // 2. Fullscreen Function
        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {});
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }

        // 3. LOCK HOME & BACK BUTTONS
        
        // Detect if user swipes up to Home or minimizes app
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isLocked) {
                // Snap back immediately
                requestFullscreen();
                navigator.vibrate([500, 200, 500]); // Vibrate strongly
                msgBox.innerText = "🚫 YOU CAN'T LEAVE!";
                
                // Try to bring window to front (works on some Androids)
                window.focus();
            }
        });

        // Detect Back Button Press
        window.addEventListener('popstate', function() {
            if(isLocked) {
                history.pushState(null, null, location.href);
                navigator.vibrate(200);
                msgBox.innerText = "🚫 BACK BUTTON DISABLED!";
            }
        });

        // Initial push state for back button logic
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function () {
            if(isLocked) {
                history.pushState(null, null, location.href);
            }
        });

        // 4. Verify Code
        function verify() {
            const code = codeInput.value;
            
            if (code === "83558") {
                isLocked = false;
                body.classList.remove('scary');
                alarm.pause();
                navigator.vibrate(0);
                
                msgBox.style.color = "#00ff00";
                msgBox.innerText = "✅ UNLOCKED";
                
                // Disable the lock mechanisms
                document.removeEventListener('visibilitychange', visibilityHandler);
                
                setTimeout(() => {
                    mainContent.innerHTML = `
                        <h1 style="color:#00ff00; font-size:40px;">🔓 UNLOCKED</h1>
                        <p>Hacking Complete.<br>You can use your phone now.</p>
                    `;
                }, 2000);

            } else {
                // Wrong Code
                navigator.vibrate([100, 50, 100]);
                msgBox.style.color = "#ff3333";
                msgBox.innerText = "❌ WRONG CODE! TRY AGAIN.";
                codeInput.value = "";
            }
        }

        // Helper for visibility change to remove later if needed
        const visibilityHandler = () => {}; 

    </script>
</body>
</html>
