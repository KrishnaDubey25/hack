<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Critical</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: white;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        body.scary-mode {
            background-color: #500000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { background-color: #500000; box-shadow: inset 0 0 50px #000; }
            50% { background-color: #800000; box-shadow: inset 0 0 100px #ff0000; }
            100% { background-color: #500000; box-shadow: inset 0 0 50px #000; }
        }

        .container {
            text-align: center;
            width: 90%;
            z-index: 10;
            padding: 20px;
        }

        .microsoft-logo {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .sq { width: 25px; height: 25px; background: #fff; opacity: 0.8; }

        h1 {
            font-size: 32px;
            color: #ff3333;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 10px;
        }

        .status {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .code-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ff3333;
            margin-bottom: 20px;
        }

        input[type="number"] {
            font-size: 30px;
            padding: 10px;
            width: 150px;
            text-align: center;
            background: #000;
            color: #fff;
            border: none;
            outline: none;
        }

        .unlock-btn {
            display: block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff3333;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .message-box {
            margin-top: 20px;
            font-weight: bold;
            min-height: 50px;
            color: #ffcc00;
        }

        /* Start Screen Overlay */
        #startScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #startBtn {
            padding: 20px 40px;
            font-size: 24px;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

    </style>
</head>
<body id="bodyElement">

    <!-- Start Screen -->
    <div id="startScreen">
        <!-- REMOVED "SYSTEM HACKED" TITLE FROM FRONT PAGE -->
        <h1 style="color:white; font-size: 40px;">Welcome</h1>
        
        <!-- BUTTON BELOW WELCOME TEXT -->
        <button id="startBtn">TAP HERE</button>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContainer" style="display:none;">
        
        <div class="microsoft-logo">
            <div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div>
        </div>

        <h1>⚠️ SYSTEM HACKED ⚠️</h1>
        <p class="status">Locked by Microsoft.<br>Data is being deleted...</p>

        <div class="code-box">
            <p style="margin:0 0 10px 0; font-size:14px;">Enter Secret Code to Stop Hacking:</p>
            <input type="number" id="secretCode" placeholder="****">
            <button class="unlock-btn" onclick="checkCode()">VERIFY</button>
        </div>

        <div class="message-box" id="msgBox"></div>
        
        <a href="tel:+911234567890" style="color: #fff; text-decoration: underline; font-size: 14px;">Or Call: 1234567890</a>
    </div>

    <!-- Audio File (Added playsinline and muted for better mobile support) -->
    <audio id="dangerSound" src="dangerous.mp3" loop playsinline></audio>

    <script>
        const body = document.body;
        const msgBox = document.getElementById('msgBox');
        const codeInput = document.getElementById('secretCode');
        const sound = document.getElementById('dangerSound');
        const startScreen = document.getElementById('startScreen');
        const mainContainer = document.getElementById('mainContainer');
        const startBtn = document.getElementById('startBtn');
        
        let isLocked = true;

        // 1. Start Button Click
        startBtn.addEventListener('click', function() {
            startScreen.style.display = 'none';
            mainContainer.style.display = 'block';
            
            // Fullscreen Mode
            toggleFullScreen();
            
            // Vibration Start
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            
            // Play Sound (Try to play immediately)
            sound.play().catch(e => {
                console.log("Audio play failed: " + e);
                // If it fails, try again on next touch
                document.addEventListener('touchstart', function() {
                    sound.play();
                }, {once: true});
            });
            
            triggerScaryMode();
        });

        // Fullscreen Helper
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            }
        }

        // 2. Home Button / Swipe Up Lock (Android & iOS)
        // We use visibilitychange and popstate to detect if user leaves or minimizes
        window.onpopstate = function () {
            history.go(1); 
            if(isLocked) triggerScaryMode();
        };

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isLocked) {
                // If they minimize, force back or show alert
                toggleFullScreen();
                triggerScaryMode();
            }
        });

        // Scary Mode Function
        function triggerScaryMode() {
            body.classList.add('scary-mode');
            
            // Strong Vibration
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 1000]); 
            }

            msgBox.innerHTML = "⚠️ You can't escape! Hackers have caught you!";
            msgBox.style.color = "#fff";
            
            // Restart Sound if paused
            sound.currentTime = 0;
            sound.play().catch(e => {});

            setTimeout(() => {
                if(isLocked) {
                    msgBox.innerHTML = "❌ Process cannot be canceled...<br>More data will be deleted!";
                }
            }, 2000);
        }

        // Check Code Function
        function checkCode() {
            const code = codeInput.value;

            if (code === "83558") {
                body.classList.remove('scary-mode');
                if (navigator.vibrate) navigator.vibrate(0);
                sound.pause();

                msgBox.innerHTML = "✅ Code Correct! Hacking stopped...";
                msgBox.style.color = "#00ff00"; 
                isLocked = false; 

                setTimeout(() => {
                    mainContainer.innerHTML = `
                        <h1 style="color:#00ff00;">🔓 UNLOCKED</h1>
                        <p>Hacking ended by Microsoft.<br>You can use your phone now.</p>
                    `;
                }, 3000);

            } else {
                triggerScaryMode();
                codeInput.value = "";
            }
        }

    </script>
</body>
</html>
